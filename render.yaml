services:
  - type: web
    name: content-os
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: content-os-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: content-os-db
    databaseName: content_os
    # DB wurde im Render-Dashboard auf basic_256mb (bezahlt) hochgestuft —
    # via Render-API verifiziert 2026-06-22. KEIN Free-Tier, kein Ablauf-/Löschrisiko.
    plan: basic_256mb
