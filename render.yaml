services:
  - type: web
    name: content-os
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: content-os-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: content-os-db
    databaseName: content_os
    plan: free
