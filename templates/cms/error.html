{% extends "base.html" %}
{% block title %}{{ code }} — Content OS{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
  <div class="text-8xl font-black text-white/5 mb-4">{{ code }}</div>
  <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mb-6">
    <i class="fa-solid fa-{% if code == 404 %}magnifying-glass{% else %}circle-exclamation{% endif %} text-red-400 text-2xl"></i>
  </div>
  <h1 class="text-2xl font-bold text-white mb-2">{{ title }}</h1>
  <p class="text-gray-500 mb-8 max-w-sm">{{ message }}</p>
  <a href="{{ url_for('dashboard') }}" class="btn-primary">
    <i class="fa-solid fa-house mr-2"></i>Zum Dashboard
  </a>
</div>
{% endblock %}
