{% extends "base.html" %}
{% block title %}Teammitglied hinzufügen — Content OS{% endblock %}
{% block page_title %}NEUES MITGLIED{% endblock %}

{% block content %}
<div style="margin-bottom:20px">
  <a href="{{ url_for('team') }}" style="font-size:12px;color:var(--muted);text-decoration:none">← Team</a>
</div>
<div style="max-width:480px">
  <form method="post" style="display:flex;flex-direction:column;gap:16px">
    <div class="card" style="padding:24px;display:flex;flex-direction:column;gap:16px">
      <div>
        <label class="form-label">Name *</label>
        <input type="text" name="name" required class="input-field" placeholder="Vollständiger Name">
      </div>
      <div>
        <label class="form-label">E-Mail *</label>
        <input type="email" name="email" required class="input-field" placeholder="name@example.de">
      </div>
      <div>
        <label class="form-label">Rolle</label>
        <select name="role" class="select-field">
          <option value="editor">Editor — Inhalte bearbeiten</option>
          <option value="poster">Poster — Veröffentlichen</option>
          <option value="manager">Manager — Verwaltung</option>
          <option value="analyst">Analyst — Nur Analytics</option>
          <option value="owner">Owner — Voller Zugriff</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Hinzufügen</button>
      <a href="{{ url_for('team') }}" class="btn btn-ghost">Abbrechen</a>
    </div>
  </form>
</div>
{% endblock %}
