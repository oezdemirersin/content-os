<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Content OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080b12; --surface:#0f1420; --surface2:#161c2d;
      --border:rgba(255,255,255,0.07); --accent:#3b82f6;
      --text:#e2e8f0; --muted:#64748b;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
         min-height:100vh;display:flex;align-items:center;justify-content:center}

    .login-wrap{width:100%;max-width:380px;padding:0 20px}

    .logo{text-align:center;margin-bottom:40px}
    .logo h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;color:white}
    .logo h1 span{color:var(--accent)}
    .logo p{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px}

    .error-msg{
      display:flex;align-items:center;gap:8px;
      background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
      border-radius:8px;padding:12px 14px;
      font-size:13px;color:#ef4444;margin-bottom:20px
    }

    .field{margin-bottom:18px}
    .field label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;
                  color:var(--muted);text-transform:uppercase;margin-bottom:8px}
    .field input{
      width:100%;background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;padding:12px 14px;font-family:'DM Sans',sans-serif;
      font-size:14px;color:var(--text);outline:none;transition:border-color .2s
    }
    .field input:focus{border-color:var(--accent)}
    .field input::placeholder{color:var(--muted)}

    .submit-btn{
      width:100%;padding:13px;background:var(--accent);color:white;
      border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
      font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;
      transition:background .2s;margin-top:4px
    }
    .submit-btn:hover{background:#2563eb}

    .hint{text-align:center;font-size:12px;color:var(--muted);margin-top:20px}
    .hint code{background:var(--surface2);padding:2px 8px;border-radius:4px;
               font-family:monospace;color:var(--text)}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <h1>CONTENT <span>OS</span></h1>
      <p>Multi-Account Operating System</p>
    </div>

    <div class="card">
      {% if error %}
      <div class="error-msg">
        <i>⚠</i> {{ error }}
      </div>
      {% endif %}

      <form method="post">
        <div class="field">
          <label>Benutzername</label>
          <input type="text" name="username" placeholder="admin" required autofocus>
        </div>
        <div class="field">
          <label>Passwort</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="submit-btn">ANMELDEN</button>
      </form>
    </div>

    <div class="hint">Standard: <code>admin</code> / <code>admin123</code></div>
  </div>
</body>
</html>
